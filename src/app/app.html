<header class="top-bar">
  <span class="app-title">TaskManager</span>
  <button class="theme-toggle" (click)="toggleTheme()">
    @if(isDarkModeActive()) {
      <span class="material-icons">
        light_mode
      </span>
    }
    @else {
      <span class="material-icons">
        dark_mode
      </span>
    }
  </button>
</header>
<main class="app-content">
  <router-outlet></router-outlet>
</main>
