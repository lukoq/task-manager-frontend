<div class="info-container" >
    <div class="summary-cards-container">
        <div class="card picture">
            <div class="text">
                <span class="label profile">This is your profile page</span>
            </div>
            <span class="material-icons avatar">
                account_circle
            </span>
        </div>
      <div class="card">
        <div class="text">
            <span class="label">Username</span>
            <span class="value">yournick2026</span>
        </div>
      </div>
      <div class="card">
        <div class="text">
            <span class="label">Email</span>
            <span class="value">youremail@test.com</span>
        </div>
      </div>
      <div class="card">
        <div class="text">
            <span class="label">Password</span>
            <span class="value">************</span>
        </div>
        <div class="actions">
            <button class="btn-changeapassword" (click)="openChangeModal()">
                Change
            </button>
        </div>
      </div>
    </div>
  </div>

  @if (isChangeModalOpen()) {
    <div class="modal-overlay" (click)="closeChangeModal()">
      <div class="modal-container" (click)="$event.stopPropagation()">
        
        <div class="modal-header">
          <h2>Change your password</h2>
          <button class="close-btn" (click)="closeChangeModal()">&times;</button>
        </div>
  
        <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="oldPassword">Old password</label>
            <input 
              id="oldPassword" 
              type="password" 
              formControlName="oldPassword" 
              [class.error]="changePasswordForm.get('oldPassword')?.invalid && changePasswordForm.get('oldPassword')?.touched"
            >
          </div>
  
          <div class="form-group">
            <label for="newPassword">New password</label>
            <input 
              id="newPassword" 
              type="password" 
              formControlName="newPassword"
              [class.error]="changePasswordForm.get('newPassword')?.invalid && changePasswordForm.get('newPassword')?.touched"
            >
            @if (changePasswordForm.get('newPassword')?.hasError('minlength')) {
              <small class="error-text">At least 5 characters required.</small>
            }
          </div>
  
          <div class="form-group">
            <label for="repeatNewPassword">Repeat new password</label>
            <input 
              id="repeatNewPassword" 
              type="password" 
              formControlName="repeatNewPassword"
              [class.error]="changePasswordForm.get('repeatNewPassword')?.invalid && changePasswordForm.get('repeatNewPassword')?.touched"
            >
          </div>
  
          <div class="modal-actions">
            <button type="button" class="btn-secondary" (click)="closeChangeModal()">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="changePasswordForm.invalid">Save</button>
          </div>
        </form>
  
      </div>
    </div>
  }
